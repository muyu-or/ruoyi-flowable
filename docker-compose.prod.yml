services:
  mysql:
    image: mysql:8.0.36
    container_name: ruoyi-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-flowable}
    volumes:
      - ${MYSQL_DATA_PATH:-/data/ruoyi/mysql}:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_PASSWORD:-123456} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    container_name: ruoyi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-123456}
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${REDIS_DATA_PATH:-/data/ruoyi/redis}:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-123456} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20

  ruoyi-admin:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: ruoyi-admin
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: ${SERVER_PORT:-8080}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-flowable}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      RUOYI_PROFILE: ${RUOYI_PROFILE:-/data/ruoyi/uploadPath}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${RUOYI_PROFILE:-/data/ruoyi/uploadPath}:${RUOYI_PROFILE:-/data/ruoyi/uploadPath}
      - ${RUOYI_LOG_PATH:-/data/ruoyi/logs}:/app/logs

  ruoyi-ui:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: ruoyi-ui
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      ruoyi-admin:
        condition: service_started
    environment:
      TZ: ${TZ:-Asia/Shanghai}
