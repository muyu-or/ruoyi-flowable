<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧智能设备监管中心</title>
  <style>
    :root {
      --bg-0: #020812;
      --bg-1: #051426;
      --bg-2: #071f39;
      --panel: rgba(8, 24, 44, 0.78);
      --panel-2: rgba(5, 18, 35, 0.92);
      --line: rgba(47, 226, 255, 0.28);
      --line-strong: rgba(71, 243, 255, 0.72);
      --cyan: #52f4ff;
      --cyan-2: #8ffcff;
      --blue: #4a8dff;
      --green: #6dffcf;
      --yellow: #ffe27a;
      --text: #e6fbff;
      --muted: #7eb9c8;
      --shadow: 0 0 22px rgba(36, 220, 255, 0.12), inset 0 0 40px rgba(36, 220, 255, 0.035);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 14%, rgba(0, 210, 255, 0.12), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(0, 106, 255, 0.08), transparent 30%),
        linear-gradient(180deg, #030913 0%, #04101d 52%, #02070f 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(51, 222, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(51, 222, 255, 0.06) 1px, transparent 1px);
      background-size: 30px 30px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      pointer-events: none;
      opacity: 0.45;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 16%, transparent 84%, rgba(255,255,255,.02)),
        radial-gradient(circle at center, transparent 48%, rgba(0,0,0,0.25) 100%);
      pointer-events: none;
    }

    .dashboard {
      width: 100vw;
      height: 100vh;
      padding: 16px 16px 12px;
      display: grid;
      grid-template-columns: 320px minmax(900px, 1fr) 320px;
      grid-template-rows: 104px 118px minmax(420px, 1fr) 206px;
      gap: 14px;
      position: relative;
    }

    .panel {
      position: relative;
      background: linear-gradient(180deg, rgba(8, 26, 48, 0.72), rgba(3, 13, 26, 0.92));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(88, 244, 255, 0.03), transparent),
        linear-gradient(180deg, rgba(255,255,255,0.015), transparent 28%);
      pointer-events: none;
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(89, 245, 255, 0.06);
      pointer-events: none;
    }

    .cut-corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(82, 244, 255, 0.75);
      border-style: solid;
      pointer-events: none;
      filter: drop-shadow(0 0 6px rgba(82,244,255,.35));
    }
    .lt { top: 6px; left: 6px; border-width: 2px 0 0 2px; }
    .rt { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
    .lb { bottom: 6px; left: 6px; border-width: 0 0 2px 2px; }
    .rb { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

    .header {
      grid-column: 1 / 4;
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }

    .header .line {
      height: 2px;
      position: relative;
      background: linear-gradient(90deg, transparent, rgba(82,244,255,.9), transparent);
      filter: drop-shadow(0 0 6px rgba(82,244,255,.35));
    }

    .title-shell {
      margin: 0 16px;
      min-width: 620px;
      height: 88px;
      display: grid;
      place-items: center;
      position: relative;
      clip-path: polygon(5% 0, 95% 0, 100% 35%, 96% 100%, 4% 100%, 0 35%);
      background: linear-gradient(180deg, rgba(6, 42, 68, 0.95), rgba(6, 24, 44, 0.88));
      border: 1px solid rgba(82,244,255,.32);
      box-shadow: 0 0 24px rgba(82,244,255,.12), inset 0 0 22px rgba(82,244,255,.08);
    }

    .title-shell::before,
    .title-shell::after {
      content: "";
      position: absolute;
      top: 14px;
      width: 86px;
      height: 18px;
      background-image: radial-gradient(circle, rgba(82,244,255,.85) 1.2px, transparent 1.5px);
      background-size: 10px 10px;
      opacity: .55;
    }
    .title-shell::before { left: 34px; }
    .title-shell::after { right: 34px; }

    .title-shell h1 {
      margin: 0;
      font-size: 44px;
      letter-spacing: 4px;
      font-weight: 800;
      color: #b3ffff;
      text-shadow: 0 0 16px rgba(82,244,255,.45), 0 0 26px rgba(82,244,255,.22);
    }

    .left-top { grid-column: 1; grid-row: 2 / 4; display: grid; grid-template-rows: 280px 1fr; gap: 14px; }
    .right-top { grid-column: 3; grid-row: 2 / 4; display: grid; grid-template-rows: 280px 1fr; gap: 14px; }
    .top-strip { grid-column: 2; grid-row: 2; }
    .center-main { grid-column: 2; grid-row: 3; }
    .left-bottom { grid-column: 1; grid-row: 4; }
    .center-bottom { grid-column: 2; grid-row: 4; }
    .right-bottom { grid-column: 3; grid-row: 4; }

    .inner { padding: 16px 16px 12px; height: 100%; position: relative; }
    .panel-title {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--cyan-2);
    }
    .panel-title::before,
    .panel-title::after {
      content: "";
      width: 18px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan));
      box-shadow: 0 0 8px rgba(82,244,255,.35);
    }

    .counter-label {
      font-size: 16px;
      color: #a7f8ff;
      margin-bottom: 10px;
    }

    .digits {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .digit {
      width: 46px;
      height: 56px;
      display: grid;
      place-items: center;
      font-size: 34px;
      font-weight: 800;
      color: #afffff;
      background: linear-gradient(180deg, rgba(0, 173, 255, 0.16), rgba(0, 76, 118, 0.36));
      border: 1px solid rgba(82,244,255,.34);
      box-shadow: inset 0 0 10px rgba(82,244,255,.08), 0 0 10px rgba(82,244,255,.08);
      text-shadow: 0 0 10px rgba(82,244,255,.25);
    }

    .ring-wrap {
      height: calc(100% - 92px);
      display: grid;
      place-items: center;
      position: relative;
    }

    .ring {
      width: 168px;
      height: 168px;
      border-radius: 50%;
      background: conic-gradient(var(--yellow) 0 75%, rgba(106, 250, 255, 0.92) 75% 100%);
      display: grid;
      place-items: center;
      box-shadow: 0 0 26px rgba(82,244,255,.14);
      position: relative;
      animation: breathe 3.8s ease-in-out infinite;
    }

    .ring::before {
      content: "";
      width: 126px;
      height: 126px;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(8, 31, 50, 0.96), rgba(3, 13, 24, 0.96));
      border: 1px solid rgba(82,244,255,.26);
      box-shadow: inset 0 0 18px rgba(82,244,255,.08);
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(82,244,255,.12);
    }

    .ring-text {
      position: absolute;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.45;
      color: #ecffd3;
    }
    .ring-text strong { font-size: 33px; display: block; color: #fff7aa; }

    .triple-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .mini-stat {
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      border: 1px dashed rgba(82,244,255,.18);
      background: linear-gradient(180deg, rgba(9, 39, 61, 0.26), rgba(5, 19, 34, 0.16));
    }
    .mini-stat strong {
      font-size: 28px;
      color: #8ffcff;
      display: block;
      margin-bottom: 6px;
    }
    .mini-stat span {
      font-size: 13px;
      color: var(--muted);
    }

    .chart { width: 100%; height: 120px; display: block; }

    .grid-table {
      margin-top: 10px;
      font-size: 12px;
      border-top: 1px solid rgba(82,244,255,.14);
    }
    .grid-table .head,
    .grid-table .item {
      display: grid;
      grid-template-columns: 70px 1fr 88px;
      gap: 8px;
      align-items: center;
      padding: 7px 8px;
    }
    .grid-table .head {
      color: #94f6ff;
      background: rgba(44, 164, 203, 0.15);
      font-weight: 700;
    }
    .grid-table .item:nth-child(odd) { background: rgba(255,255,255,.018); }
    .grid-table .item:nth-child(even) { background: rgba(0,0,0,.08); }

    .status-grid {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px 8px 6px;
    }

    .status-card {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px 4px;
      background: linear-gradient(180deg, rgba(7, 28, 49, 0.35), rgba(3, 12, 24, 0.08));
      border: 1px solid rgba(82,244,255,.08);
    }

    .status-card .count {
      font-size: 18px;
      font-weight: 800;
      color: #b4ffe6;
      margin-bottom: 8px;
      text-shadow: 0 0 8px rgba(82,244,255,.22);
    }

    .status-card .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 24px;
      margin-bottom: 8px;
      background: radial-gradient(circle at 35% 30%, rgba(126,255,241,.45), rgba(0,88,122,.18) 65%, transparent 72%);
      border: 1px solid rgba(82,244,255,.14);
      box-shadow: inset 0 0 14px rgba(82,244,255,.08), 0 0 12px rgba(82,244,255,.08);
    }

    .status-card .name {
      font-size: 14px;
      color: #93d5e2;
      white-space: nowrap;
    }

    .center-shell {
      position: relative;
      height: 100%;
      background:
        radial-gradient(circle at center, rgba(82,244,255,.08), transparent 28%),
        linear-gradient(180deg, rgba(4, 21, 39, 0.4), rgba(2, 10, 20, 0.82));
      border: 1px solid rgba(82,244,255,.18);
      overflow: hidden;
    }

    .center-shell::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(82,244,255,.09);
    }

    .center-title {
      position: absolute;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #b4ffff;
      text-shadow: 0 0 12px rgba(82,244,255,.3);
      z-index: 3;
    }

    .chip {
      position: absolute;
      width: 220px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(90deg, rgba(8, 48, 70, 0.34), rgba(8, 108, 138, 0.18), rgba(8, 48, 70, 0.34));
      clip-path: polygon(10% 0, 90% 0, 100% 28%, 92% 100%, 8% 100%, 0 28%);
      border: 1px solid rgba(82,244,255,.18);
      color: #a9fdff;
      font-size: 25px;
      font-weight: 700;
      box-shadow: inset 0 0 18px rgba(82,244,255,.06), 0 0 14px rgba(82,244,255,.07);
      z-index: 2;
    }
    .chip .badge {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle, rgba(126,255,248,.46), rgba(0,84,109,.2));
      border: 1px solid rgba(82,244,255,.22);
      font-size: 18px;
    }

    .metric-box {
      position: absolute;
      width: 110px;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(11, 42, 70, 0.76), rgba(5, 18, 34, 0.92));
      border: 1px solid rgba(82,244,255,.18);
      box-shadow: 0 0 12px rgba(82,244,255,.08);
      z-index: 2;
    }
    .metric-box strong {
      font-size: 18px;
      color: #eaffff;
      display: block;
      margin-bottom: 6px;
    }
    .metric-box span {
      font-size: 13px;
      color: #9ccad5;
    }

    .hub-zone {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      z-index: 1;
    }

    .hub-outer, .hub-middle, .hub-core {
      position: absolute;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .hub-outer {
      width: 300px;
      height: 300px;
      background: conic-gradient(from 0deg, rgba(82,244,255,.55), rgba(82,244,255,.04), rgba(82,244,255,.5), rgba(82,244,255,.05), rgba(82,244,255,.55));
      box-shadow: 0 0 28px rgba(82,244,255,.1), inset 0 0 24px rgba(82,244,255,.06);
      animation: spin 16s linear infinite;
    }
    .hub-outer::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 10px solid rgba(82,244,255,.14);
    }

    .hub-middle {
      width: 202px;
      height: 202px;
      border: 2px dashed rgba(82,244,255,.22);
      animation: spinReverse 18s linear infinite;
    }

    .hub-core {
      width: 132px;
      height: 132px;
      background: radial-gradient(circle at center, rgba(0, 244, 255, 0.32), rgba(0, 33, 60, 0.96));
      border: 1px solid rgba(82,244,255,.28);
      box-shadow: inset 0 0 18px rgba(82,244,255,.08), 0 0 18px rgba(82,244,255,.08);
      display: grid;
      place-items: center;
      color: #9ffbff;
      font-size: 46px;
      text-shadow: 0 0 10px rgba(82,244,255,.22);
    }

    .runtime {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      text-align: center;
      z-index: 2;
    }
    .runtime .days {
      font-size: 42px;
      font-weight: 800;
      color: #87fbff;
      text-shadow: 0 0 14px rgba(82,244,255,.22);
    }
    .runtime .tag {
      margin-top: 8px;
      display: inline-block;
      padding: 11px 26px 8px;
      font-size: 14px;
      color: #ebffff;
      background: linear-gradient(180deg, rgba(82,244,255,.24), rgba(8, 56, 74, 0.26));
      clip-path: polygon(10% 0, 90% 0, 100% 34%, 84% 100%, 16% 100%, 0 34%);
      border: 1px solid rgba(82,244,255,.2);
    }

    .select-tag {
      position: absolute;
      right: 16px;
      top: 14px;
      font-size: 12px;
      color: #b3f9ff;
      border: 1px solid rgba(82,244,255,.18);
      background: rgba(6, 18, 34, 0.86);
      padding: 6px 10px;
      z-index: 2;
    }

    .progress-wrap { display: grid; gap: 12px; margin-top: 8px; }
    .progress-item {
      display: grid;
      grid-template-columns: 92px 1fr 44px;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #a8dbe6;
    }
    .track {
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(82,244,255,.09);
      overflow: hidden;
    }
    .bar {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(82,244,255,.32), rgba(109,255,207,.96));
      box-shadow: 0 0 10px rgba(109,255,207,.18);
      animation: breathe 3.4s ease-in-out infinite;
    }

    .energy-metrics {
      margin-top: 12px;
      margin-bottom: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .energy-card {
      text-align: center;
      padding: 8px 0;
    }
    .energy-card strong {
      display: block;
      font-size: 22px;
      color: #8ffcff;
      margin-bottom: 5px;
    }
    .energy-card span {
      color: #93cddb;
      font-size: 13px;
    }

    .bottom-shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .legend {
      display: flex;
      justify-content: flex-end;
      gap: 18px;
      font-size: 12px;
      color: #89c4cf;
      padding-right: 8px;
    }
    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 6px;
      vertical-align: -1px;
    }
    .legend .people::before { background: #54f7ff; }
    .legend .car::before { background: #6dffcf; }

    .time-board {
      text-align: center;
      color: #35f2ff;
      font-size: 22px;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(82,244,255,.18);
      margin-top: 2px;
    }
    .time-board small {
      display: block;
      color: #86d9e3;
      font-size: 12px;
      margin-top: 3px;
    }

    .scan {
      position: fixed;
      left: 0;
      right: 0;
      top: -90px;
      height: 90px;
      background: linear-gradient(180deg, transparent, rgba(82,244,255,.08), transparent);
      pointer-events: none;
      animation: scan 7s linear infinite;
      opacity: .65;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes spinReverse {
      from { transform: translate(-50%, -50%) rotate(360deg); }
      to { transform: translate(-50%, -50%) rotate(0deg); }
    }
    @keyframes breathe {
      0%,100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.02); filter: brightness(1.08); }
    }
    @keyframes scan {
      0% { transform: translateY(0); }
      100% { transform: translateY(calc(100vh + 120px)); }
    }

    @media (max-width: 1580px) {
      body { overflow: auto; }
      .dashboard {
        min-width: 1580px;
        min-height: 100vh;
      }
    }
  </style>
</head>
<body>
  <div class="scan"></div>
  <div class="dashboard">
    <header class="header">
      <div class="line"></div>
      <div class="title-shell"><h1>智慧智能设备监管中心</h1></div>
      <div class="line"></div>
    </header>

    <section class="panel left-top">
      <span class="cut-corner lt"></span><span class="cut-corner rt"></span><span class="cut-corner lb"></span><span class="cut-corner rb"></span>
      <div class="panel">
        <span class="cut-corner lt"></span><span class="cut-corner rt"></span><span class="cut-corner lb"></span><span class="cut-corner rb"></span>
        <div class="inner">
          <h3 class="panel-title">在线设备总数</h3>
          <div class="counter-label">实时联网状态</div>
          <div class="digits" id="onlineDigits"></div>
          <div class="ring-wrap">
            <div class="ring"></div>
            <div class="ring-text"><strong id="onlineRate">75%</strong>在线率</div>
          </div>
        </div>
      </div>
      <div class="panel">
        <span class="cut-corner lt"></span><span class="cut-corner rt"></span><span class="cut-corner lb"></span><span class="cut-corner rb"></span>
        <div class="inner">
          <h3 class="panel-title">故障对比分析</h3>
          <div class="triple-stats">
            <div class="mini-stat"><strong>70438</strong><span>故障总数</span></div>
            <div class="mini-stat"><strong>99</strong><span>本月故障总数</span></div>
            <div class="mini-stat"><strong>↑2%</strong><span>较上月</span></div>
          </div>
          <svg class="chart" id="faultChart" viewBox="0 0 300 120" preserveAspectRatio="none"></svg>
          <div class="grid-table" id="warningTable"></div>
        </div>
      </div>
    </section>

    <section class="panel top-strip">
      <span class="cut-corner lt"></span><span class="cut-corner rt"></span><span class="cut-corner lb"></span><span class="cut-corner rb"></span>
      <div class="status-grid" id="statusGrid"></div>
    </section>

    <section class="panel right-top">
      <span class="cut-corner lt"></span><span class="cut-corner rt"></span><span class="cut-corner lb"></span><span class="cut-corner rb"></span>
      <div class="panel">
        <span class="cut-corner lt"></span><span class="cut-corner rt"></span><span class="cut-corner lb"></span><span class="cut-corner rb"></span>
        <div class="inner">
          <h3 class="panel-title">外部接入设备</h3>
          <div class="counter-label">统一接入统计</div>
          <div class="digits" id="externalDigits"></div>
          <div style="font-size:14px;color:#9ce6f1;margin-bottom:12px;">运行情况</div>
          <div class="progress-wrap" id="progressWrap"></div>
        </div>
      </div>
      <div class="panel">
        <span class="cut-corner lt"></span><span class="cut-corner rt"></span><span class="cut-corner lb"></span><span class="cut-corner rb"></span>
        <div class="inner">
          <h3 class="panel-title">能耗统计</h3>
          <div class="select-tag">2019年 ▾</div>
          <div class="energy-metrics">
            <div class="energy-card"><strong>7038</strong><span>kWh 电耗</span></div>
            <div class="energy-card"><strong>450</strong><span>m³ 水耗</span></div>
            <div class="energy-card"><strong>667</strong><span>m³ 气耗</span></div>

    <section class="panel left-bottom">
      <span class="cut-corner lt"></span><span class="cut-corner rt"></span><span class="cut-corner lb"></span><span class="cut-corner rb"></span>
      <div class="inner">
        <h3 class="panel-title">最新日志告警</h3>

    </section>

    <section class="panel center-bottom">
      <span class="cut-corner lt"></span><span class="cut-corner rt"></span><span class="cut-corner lb"></span><span class="cut-corner rb"></span>
      <div class="inner">
        <div class="select-tag">2020.05 ▾</div>
        <h3 class="panel-title">园区人流车流量监控</h3>
        <div class="bottom-shell">
          <div class="legend"><span class="people">人流量</span><span class="car">车流量</span></div>
          <svg class="chart" style="height:120px;" id="flowChart" viewBox="0 0 860 140" preserveAspectRatio="none"></svg>
          <div class="time-board" id="timeBoard">2021.09.09 星期四 12:59<small>实时数据刷新中</small></div>
        </div>
      </div>

    <section class="panel right-bottom">
      <span class="cut-corner lt"></span><span class="cut-corner rt"></span><span class="cut-corner lb"></span><span class="cut-corner rb"></span>
      <div class="inner">
        <h3 class="panel-title">最新设备维修</h3>
        <div class="grid-table" id="repairTable"></div>
      </div>

  </div>

  <script>
    const data = {
      onlineTotal: 75,
      externalTotal: 2643,
      onlineRate: 75,
      safeDays: 34522,
      status: [
        { count: '48/48', icon: '🚗', name: '智慧车辆' },
        { count: '20/40', icon: '👥', name: '智慧会议' },
        { count: '78/78', icon: '⬢', name: '智慧能耗' },
        { count: '89/89', icon: '🧭', name: '智慧发布' },
        { count: '78/78', icon: '🏠', name: '智慧物业' },
        { count: '54/54', icon: '🗓️', name: '智慧考勤' },
        { count: '348/348', icon: '🪪', name: '智慧访客' },
        { count: '453/453', icon: '🛡️', name: '智慧安防' },
        { count: '45/45', icon: '🍽️', name: '智慧餐饮' }
      ],
      progress: [
        { name: '智慧摄像头', value: 79 },
        { name: '智慧空开', value: 70 },
        { name: '智慧窗帘', value: 67 },
        { name: '智慧显示屏', value: 52 },
        { name: '智慧空调', value: 45 }
      ],
      fault: {
        labels: ['车辆','会议','能耗','发布','物业','考勤','访客','安防','餐饮'],
        current: [31, 21, 40, 25, 43, 18, 36, 28, 30],
        last: [23, 44, 19, 37, 27, 41, 29, 35, 22]
      },
      energy: [18, 45, 32, 50, 57, 36, 73, 44, 69, 42, 71, 48],
      flow: {
        people: [498,637,343,590,998,998,998,624,808,740,496,312,808,414,544,500,808,444,482,760,760,128,326,358,791,389,808,808,656,428],
        car: [260,410,190,320,720,680,700,450,620,540,320,210,610,280,390,360,650,290,310,520,510,92,210,240,570,260,610,620,470,300]
      },
      warnings: [
        ['张三', '设备不在线', '06.01 12:34'],
        ['张三', '设备不在线', '06.01 12:34'],
        ['张三', '设备不在线', '06.01 12:34'],
        ['张三', '设备不在线', '06.01 12:34'],
        ['张三', '设备不在线', '06.01 12:34'],
        ['张三', '设备不在线', '06.01 12:34']
      ],
      repairs: [
        ['张丁', '磨损性故障', '07.11 08:45'],
        ['李思佳', '断线性故障', '07.04 16:20'],
        ['李昊燃', '误操作故障', '07.01 12:00'],
        ['伍佳', '超负荷故障', '06.01 12:34'],
        ['王梦梦', '设备不在线', '06.01 12:34'],
        ['李苛', '老化性故障', '06.01 12:34'],
        ['李佳', '老化性故障', '06.01 12:34'],
        ['伍佳', '误操作故障', '06.01 12:34']
      ]
    };

    function renderDigits(id, value, size = 5) {
      const s = String(value).padStart(size, '0');
      document.getElementById(id).innerHTML = s.split('').map(n => `<div class="digit">${n}</div>`).join('');
    }

    function renderStatus() {
      document.getElementById('statusGrid').innerHTML = data.status.map(item => `
        <div class="status-card">
          <div class="count">${item.count}</div>
          <div class="icon">${item.icon}</div>
          <div class="name">${item.name}</div>
        </div>
      `).join('');
    }

    function renderProgress() {
      document.getElementById('progressWrap').innerHTML = data.progress.map(item => `
        <div class="progress-item">
          <span>${item.name}</span>
          <div class="track"><div class="bar" style="width:${item.value}%"></div></div>
          <span>${item.value}%</span>
        </div>
      `).join('');
    }

    function renderTable(id, head1, head2, head3, rows) {
      document.getElementById(id).innerHTML = `
        <div class="head"><span>${head1}</span><span>${head2}</span><span>${head3}</span></div>
        ${rows.map(row => `<div class="item"><span>${row[0]}</span><span>${row[1]}</span><span>${row[2]}</span></div>`).join('')}
      `;
    }

    function drawGrid(svg, w, h, sx, sy) {
      let out = '';
      for (let x = 0; x <= w; x += sx) out += `<line x1="${x}" y1="0" x2="${x}" y2="${h}" stroke="rgba(82,244,255,.06)"/>`;
      for (let y = 0; y <= h; y += sy) out += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="rgba(82,244,255,.06)"/>`;
      svg.insertAdjacentHTML('beforeend', out);
    }

    function drawLine(svgId, s1, s2, labels) {
      const svg = document.getElementById(svgId);
      const w = 300, h = 120;
      const p = { l: 10, r: 10, t: 10, b: 24 };
      const iw = w - p.l - p.r;
      const ih = h - p.t - p.b;
      const max = Math.max(...s1, ...(s2 || [])) * 1.1;
      svg.innerHTML = `
        <defs>
          <filter id="glow1"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="glow2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>`;
      drawGrid(svg, w, h, 30, 24);

      const pathOf = arr => arr.map((v, i) => {
        const x = p.l + iw * i / (arr.length - 1);
        const y = p.t + ih - ih * v / max;
        return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
      }).join(' ');

      const drawSeries = (arr, color, filterId) => {
        svg.insertAdjacentHTML('beforeend', `<path d="${pathOf(arr)}" fill="none" stroke="${color}" stroke-width="2.2" filter="url(#${filterId})"/>`);
        arr.forEach((v, i) => {
          const x = p.l + iw * i / (arr.length - 1);
          const y = p.t + ih - ih * v / max;
          svg.insertAdjacentHTML('beforeend', `<circle cx="${x}" cy="${y}" r="3.1" fill="${color}"/>`);
        });
      };

      drawSeries(s1, '#55f7ff', 'glow1');
      if (s2) drawSeries(s2, '#ff9b61', 'glow2');

      labels.forEach((lab, i) => {
        const x = p.l + iw * i / (labels.length - 1);
        svg.insertAdjacentHTML('beforeend', `<text x="${x}" y="${h - 6}" fill="#77b3c1" font-size="10" text-anchor="middle">${lab}</text>`);
      });
    }

    function drawBars() {
      const svg = document.getElementById('flowChart');
      const people = data.flow.people;
      const car = data.flow.car;
      const w = 860, h = 140;
      const p = { l: 8, r: 8, t: 8, b: 24 };
      const iw = w - p.l - p.r;
      const ih = h - p.t - p.b;
      const max = Math.max(...people, ...car) * 1.1;
      const groupW = iw / people.length;
      const bw = Math.min(10, groupW * 0.28);
      svg.innerHTML = '';
      drawGrid(svg, w, h, 28, 24);

      people.forEach((v, i) => {
        const cx = p.l + i * groupW + groupW / 2;
        const h1 = ih * v / max;
        const h2 = ih * car[i] / max;
        const y1 = p.t + ih - h1;
        const y2 = p.t + ih - h2;
        svg.insertAdjacentHTML('beforeend', `
          <rect x="${cx - bw - 2}" y="${y1}" width="${bw}" height="${h1}" rx="1.5" fill="#54f7ff" opacity="0.92"/>
          <rect x="${cx + 2}" y="${y2}" width="${bw}" height="${h2}" rx="1.5" fill="#6dffcf" opacity="0.88"/>
          <text x="${cx}" y="${h - 7}" fill="#72afbc" font-size="9" text-anchor="middle">${i + 1}</text>
        `);
        if (v > 780 || i % 5 === 0) {
          svg.insertAdjacentHTML('beforeend', `<text x="${cx - 4}" y="${y1 - 3}" fill="#7cefff" font-size="9" text-anchor="middle">${v}</text>`);
        }
      });
    }

    function updateClock() {
      const d = new Date();
      const week = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
      const pad = n => String(n).padStart(2, '0');
      const str = `${d.getFullYear()}.${pad(d.getMonth() + 1)}.${pad(d.getDate())} ${week[d.getDay()]} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      document.getElementById('timeBoard').innerHTML = `${str}<small>实时数据刷新中</small>`;
    }

    function init() {
      renderDigits('onlineDigits', data.onlineTotal, 5);
      renderDigits('externalDigits', data.externalTotal, 5);
      document.getElementById('onlineRate').textContent = `${data.onlineRate}%`;
      document.getElementById('safeDays').textContent = `${data.safeDays}天`;

      renderStatus();
      renderProgress();
      renderTable('warningTable', '最新日志操作', '故障', '时间', data.warnings);
      renderTable('latestLogs', '最新日志操作', '故障', '时间', data.warnings);
      renderTable('repairTable', '最新设备维修', '故障', '时间', data.repairs);
      drawLine('faultChart', data.fault.current, data.fault.last, data.fault.labels);
      drawLine('energyChart', data.energy, null, ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']);
      drawBars();
      updateClock();
      setInterval(updateClock, 1000);
    }

    init();
  </script>
</body>
